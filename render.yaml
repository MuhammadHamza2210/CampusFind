# Render Blueprint for the CampusFind backend.
# In Render: New → Blueprint → pick this repo. It pre-declares every env var;
# values marked `sync: false` are left blank for you to fill in the dashboard
# (paste them from your local server/.env). JWT_SECRET is auto-generated.
services:
  - type: web
    name: campusfind-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Auto-generated strong secret for signing JWTs.
      - key: JWT_SECRET
        generateValue: true
      # Set to true in production so the auth cookie is Secure + SameSite=None
      # (required for the Vercel frontend to send it cross-domain).
      - key: COOKIE_SECURE
        value: "true"
      - key: ALLOWED_EMAIL_DOMAIN
        value: bahria.edu.pk
      # --- Fill these in the Render dashboard (Environment tab) ---
      # The full https://<your-app>.vercel.app URL (no trailing slash).
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # SMTP — required so signup OTP emails actually reach users.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      # Optional: comma-separated emails granted admin on signup.
      - key: ADMIN_EMAILS
        sync: false
